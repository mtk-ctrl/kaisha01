name: Deploy TANQ App to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/setup-company-management-admMR
    paths:
      - 'tanq-app/**'
      - '.github/workflows/deploy-tanq.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tanq-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tanq-app

      - name: Build
        run: npm run build
        working-directory: tanq-app

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tanq-app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
