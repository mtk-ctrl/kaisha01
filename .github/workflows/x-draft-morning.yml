name: X文案 朝7時 (JST)

on:
  schedule:
    # 22:03 UTC = 7:03 JST (翌朝)
    - cron: '3 22 * * *'
  workflow_dispatch:
    # 手動実行ボタン（テスト用）

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 朝の文案を生成してメール送信
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TIME_SLOT: 朝
          TO_EMAIL: mtk551141@gmail.com
        run: python scripts/generate_x_draft.py
