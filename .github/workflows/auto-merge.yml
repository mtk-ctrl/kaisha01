name: Auto-merge AI branches → main + Vercel Deploy

# claude/* push → merge to main → Vercel deploy
# main push (PR merge by owner) → Vercel deploy only

on:
  push:
    branches:
      - 'claude/**'
      - 'main'

permissions:
  contents: write

jobs:
  merge-to-main:
    if: startsWith(github.ref, 'refs/heads/claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "Jobs [AI CEO]"
          git config user.email "jobs-ai@tanq.ai"

      - name: Merge feature branch into main
        run: |
          git fetch origin main
          git checkout main

          if ! git merge origin/${{ github.ref_name }} \
            --no-ff \
            -m "🚀 Auto-deploy: ${{ github.ref_name }}

          Merged by Jobs (AI CEO) via GitHub Actions.
          Source commit: ${{ github.sha }}"; then
            echo "⚠️ Merge conflict detected — aborting merge."
            echo "deploy-to-vercel will still run from current main."
            git merge --abort || true
            exit 1
          fi

          git push origin main

  deploy-to-vercel:
    # merge-to-main の成功・失敗・スキップに関わらず常に実行
    if: always()
    needs: [merge-to-main]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Run DB migrations
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping migrations"
            exit 0
          fi

          # Only run when migration files actually changed in this commit
          CHANGED=$(git diff HEAD^ HEAD --name-only -- supabase/migrations/ 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CHANGED" = "0" ]; then
            echo "ℹ️ No migration files changed — skipping DB push"
            exit 0
          fi

          echo "🗄️ ${CHANGED} migration file(s) changed — running DB push..."
          # Pin to major version @2 to avoid @latest breaking changes
          if npx supabase@2 db push --project-ref jdrhnxqvmohzikmfqzbl; then
            echo "✅ Migrations applied"
          else
            echo "::warning::Migration push failed (non-fatal) — deploy continues. Check Supabase dashboard."
          fi
        working-directory: tanq-app

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Sync env vars to Vercel
        # GitHub Secrets → Vercel Dashboard を自動同期
        # Vercel Dashboard を手動で触る必要をなくす
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          sync_var() {
            local name="$1" value="$2" envs="${3:-production preview development}"
            for e in $envs; do
              vercel env rm "$name" "$e" --yes --token="$VERCEL_TOKEN" 2>/dev/null || true
              printf '%s' "$value" | vercel env add "$name" "$e" --token="$VERCEL_TOKEN"
            done
            echo "✅ $name synced"
          }

          # 静的な設定値（シークレットではない・直接記述）
          sync_var "NEXT_PUBLIC_SUPABASE_URL"   "https://jdrhnxqvmohzikmfqzbl.supabase.co"
          sync_var "NEXT_PUBLIC_GA_ID"          "G-TK27G02856"
          sync_var "NEXT_PUBLIC_LAB_PASSWORD"   "tanq2026"

          # シークレット（GitHub Secrets から注入）
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::NEXT_PUBLIC_SUPABASE_ANON_KEY not in GitHub Secrets — Supabase auth will not work"
          else
            sync_var "NEXT_PUBLIC_SUPABASE_ANON_KEY" "$SUPABASE_ANON_KEY"
          fi

          if [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY not in GitHub Secrets — user registration API will not work"
          else
            sync_var "SUPABASE_SERVICE_ROLE_KEY" "$SUPABASE_SERVICE_KEY"
          fi

      - name: Deploy to Vercel Production
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: tanq-app

      - name: Verify production deployment
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "⏳ デプロイ反映待ち（30秒）..."
          sleep 30
          URL="https://tanq-app.vercel.app"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-vercel-protection-bypass: $BYPASS" "$URL/")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ 本番URL が $STATUS を返しました"
            exit 1
          fi
          echo "🎉 本番確認完了: $URL"
