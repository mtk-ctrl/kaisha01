name: Auto-merge AI branches → main + Vercel Deploy

# claude/* push → merge to main → Vercel deploy
# main push (PR merge by owner) → Vercel deploy only

on:
  push:
    branches:
      - 'claude/**'
      - 'main'

permissions:
  contents: write

jobs:
  merge-to-main:
    if: startsWith(github.ref, 'refs/heads/claude/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "Jobs [AI CEO]"
          git config user.email "jobs-ai@tanq.ai"

      - name: Merge feature branch into main (with conflict resolution)
        run: |
          git fetch origin main
          git checkout main

          git merge origin/${{ github.ref_name }} \
            --no-ff \
            -m "🚀 Auto-deploy: ${{ github.ref_name }}

          Merged by Jobs (AI CEO) via GitHub Actions.
          Source commit: ${{ github.sha }}" || \
          {
            echo "Merge conflict detected, resolving..."
            git merge --abort || true

            git merge -X theirs origin/${{ github.ref_name }} \
              --no-ff \
              -m "🚀 Auto-deploy: ${{ github.ref_name }}

          Merged by Jobs (AI CEO) via GitHub Actions.
          Source commit: ${{ github.sha }} (conflict resolved with 'theirs' strategy)"
          }

          git push origin main

  deploy-to-vercel:
    # claude/** → merge-to-main が成功した後にデプロイ
    # main push  → merge-to-main はスキップされるが always() でデプロイを実行
    if: always() && (needs.merge-to-main.result == 'success' || needs.merge-to-main.result == 'skipped')
    needs: [merge-to-main]
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_pHV8kt9g3wxGNxcX4zJ14aIP
      VERCEL_PROJECT_ID: prj_ZyQ7idSXjxL9sK5QtcdiYuoZZrCn
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        working-directory: tanq-app

      - name: Verify production deployment
        env:
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          echo "⏳ デプロイ反映待ち（30秒）..."
          sleep 30
          URL="https://tanq-app.vercel.app"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-vercel-protection-bypass: $BYPASS" "$URL/")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ 本番URL が $STATUS を返しました"
            exit 1
          fi
          HTML=$(curl -sL -H "x-vercel-protection-bypass: $BYPASS" "$URL/")
          if echo "$HTML" | grep -q "FFC83D"; then
            echo "✅ 新デザイン（シール風）を確認 — 黄色カラー検出"
          else
            echo "⚠️  新デザインカラーが見つかりません。デプロイ内容を確認してください"
          fi
          if echo "$HTML" | grep -q "あそびながら"; then
            echo "✅ TOPページ本文を確認"
          fi
          echo "🎉 本番確認完了: $URL"
