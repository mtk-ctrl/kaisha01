<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0ea5e9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>都道府県マスター | TANQラボ</title>
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../common/back-to-hub.css">
  <link rel="stylesheet" href="../../common/youji-setup.css">
  <link rel="stylesheet" href="style.css">
  <script src="../../common/tanq-ui.js"></script>
  <style>
  /* 画面切替の保証 */
  .screen { position: fixed !important; inset: 0 !important; top: 36px !important; display: none !important; flex-direction: column !important; align-items: center !important; overflow-y: auto !important; background: #0a1628 !important; }
  .screen.active { display: flex !important; }
  body { background: #0a1628 !important; overflow: hidden !important; }
  </style>
</head>
<body>

<!-- ===== メニュー ===== -->
<div class="screen active" id="screen-menu">
  <div class="hero">
    <div class="hero-icon">🗾</div>
    <h1 class="hero-title">都道府県マスター</h1>
    <p class="hero-sub">47都道府県を おぼえよう！</p>
    <div class="mode-list">
      <button class="mode-card" onclick="openSetup('shape')">
        <span class="mode-star" style="color:#00e5c3">🔷</span>
        <div class="mode-info">
          <div class="mode-name">かたちクイズ</div>
          <div class="mode-desc">形から県名を当てよう</div>
        </div>
        <span class="mode-badge free">無料</span>
      </button>
      <button class="mode-card" onclick="openSetup('location')">
        <span class="mode-star" style="color:#4ade80">🗾</span>
        <div class="mode-info">
          <div class="mode-name">どこかなクイズ</div>
          <div class="mode-desc">地図でどこか当てよう</div>
        </div>
        <span class="mode-badge free">無料</span>
      </button>
      <button class="mode-card" onclick="openSetup('famous')">
        <span class="mode-star" style="color:#f0c040">🍎</span>
        <div class="mode-info">
          <div class="mode-name">めいぶつクイズ</div>
          <div class="mode-desc">名物からどこか当てよう</div>
        </div>
        <span class="mode-badge free">無料</span>
      </button>
      <button class="mode-card" onclick="openFlashcard()">
        <span class="mode-star" style="color:#c4a8ff">📚</span>
        <div class="mode-info">
          <div class="mode-name">フラッシュカード</div>
          <div class="mode-desc">都道府県を確認しよう</div>
        </div>
        <span class="mode-badge free">無料</span>
      </button>
      <button class="mode-card" onclick="showScreen('screen-records')">
        <span class="mode-star" style="color:#94a3c4">🏆</span>
        <div class="mode-info">
          <div class="mode-name">きろく</div>
          <div class="mode-desc">これまでの成績</div>
        </div>
      </button>
    </div>
  </div>
</div>

<!-- ===== セットアップ ===== -->
<div class="screen" id="screen-setup">
  <div class="setup-scroll">
    <h2 class="setup-title" id="setup-mode-label">⚙️ クイズのせってい</h2>

    <!-- 出題範囲 -->
    <div class="setup-section">
      <p class="setup-label">しゅつだいはんい</p>
      <div class="region-select-grid" id="region-btns">
        <button class="region-btn active" data-region="all" onclick="selectRegion(this)">ぜんぶ（47都道府県）</button>
        <button class="region-btn" data-region="北海道" onclick="selectRegion(this)">北海道</button>
        <button class="region-btn" data-region="東北" onclick="selectRegion(this)">東北（6けん）</button>
        <button class="region-btn" data-region="関東" onclick="selectRegion(this)">関東（7けん）</button>
        <button class="region-btn" data-region="中部" onclick="selectRegion(this)">中部（9けん）</button>
        <button class="region-btn" data-region="近畿" onclick="selectRegion(this)">近畿（7けん）</button>
        <button class="region-btn" data-region="中国" onclick="selectRegion(this)">中国（5けん）</button>
        <button class="region-btn" data-region="四国" onclick="selectRegion(this)">四国（4けん）</button>
        <button class="region-btn" data-region="九州" onclick="selectRegion(this)">九州（7けん）</button>
        <button class="region-btn" data-region="沖縄" onclick="selectRegion(this)">沖縄</button>
      </div>
    </div>

    <!-- 問題数 -->
    <div class="setup-section">
      <p class="setup-label">もんだいすう</p>
      <div class="count-btns" id="count-btns">
        <button class="count-btn active" data-count="10" onclick="selectCount(this)">10もん</button>
        <button class="count-btn" data-count="20" onclick="selectCount(this)">20もん</button>
        <button class="count-btn" data-count="47" onclick="selectCount(this)">ぜんぶ</button>
      </div>
    </div>

    <button class="btn-start" onclick="startGame()">🚀 スタート！</button>
    <button class="btn-back" onclick="showScreen('screen-menu')">← もどる</button>
  </div>
</div>

<!-- ===== ゲーム ===== -->
<div class="screen" id="screen-game">

  <!-- トップバー -->
  <div class="game-topbar">
    <button class="btn-quit" onclick="confirmQuit()">✕ やめる</button>
    <div class="game-progress-wrap">
      <div class="game-progress-fill" id="game-progress-fill"></div>
    </div>
    <div class="game-score-text">⭐ <span id="g-score">0</span></div>
  </div>

  <!-- コンボ -->
  <div class="combo-badge hidden" id="combo-badge">🔥 <span id="combo-num">2</span>れんぞく！</div>

  <!-- 問題エリア -->
  <div class="question-area" id="question-area">

    <!-- かたちクイズ用 -->
    <div id="q-shape" class="q-shape hidden">
      <div class="q-label">この かたちは どこのけん？</div>
      <div class="shape-box">
        <svg class="shape-svg" id="shape-svg" viewBox="0 0 200 200">
          <polygon id="shape-polygon" fill="#00e5c3" stroke="rgba(0,229,195,0.5)" stroke-width="2"/>
        </svg>
      </div>
    </div>

    <!-- どこかなクイズ用 -->
    <div id="q-location" class="q-location hidden">
      <div class="q-label">地図のどこに あるけん？</div>
      <svg class="japan-map" id="japan-map" viewBox="0 0 600 760" xmlns="http://www.w3.org/2000/svg">
        <!-- 全都道府県のポリゴンはJSで生成 -->
      </svg>
      <!-- 沖縄インセット -->
      <div class="okinawa-inset">
        <svg id="okinawa-inset-svg" viewBox="0 0 70 50" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="68" height="48" rx="4" fill="rgba(6,182,212,0.15)" stroke="#06b6d4" stroke-width="1"/>
          <text x="35" y="28" text-anchor="middle" fill="#06b6d4" font-size="9" font-family="sans-serif">沖縄</text>
        </svg>
        <div class="okinawa-label">おきなわ</div>
      </div>
    </div>

    <!-- めいぶつクイズ用 -->
    <div id="q-famous" class="q-famous hidden">
      <div class="q-label">この めいぶつは どこのけん？</div>
      <div class="famous-card" id="famous-card">
        <div class="famous-emoji" id="famous-emoji">🍎</div>
        <div class="famous-name" id="famous-name">りんご</div>
      </div>
    </div>

    <div class="q-counter">
      <span id="g-current">1</span> / <span id="g-total">10</span>
    </div>
  </div>

  <!-- 4択 -->
  <div class="choices-grid" id="choices-grid">
    <button class="choice-btn" id="c0" onclick="answer(0)"></button>
    <button class="choice-btn" id="c1" onclick="answer(1)"></button>
    <button class="choice-btn" id="c2" onclick="answer(2)"></button>
    <button class="choice-btn" id="c3" onclick="answer(3)"></button>
  </div>

  <!-- フィードバックオーバーレイ -->
  <div class="feedback-overlay hidden" id="feedback-overlay">
    <div class="feedback-card">
      <div class="feedback-mark" id="feedback-mark">○</div>
      <div class="feedback-pref" id="feedback-pref"></div>
      <div class="feedback-kana" id="feedback-kana"></div>
      <div class="feedback-capital" id="feedback-capital"></div>
      <div class="feedback-fact" id="feedback-fact"></div>
      <div class="feedback-combo" id="feedback-combo" style="display:none"></div>
      <button class="btn-next" onclick="nextQuestion()">つぎへ ▶</button>
    </div>
  </div>

  <!-- やめる確認 -->
  <div class="quit-overlay hidden" id="quit-overlay">
    <div class="quit-card">
      <div class="quit-icon">😿</div>
      <p class="quit-title">やめちゃうの？</p>
      <button class="quit-btn-continue" onclick="closeQuit()">▶ つづける！</button>
      <button class="quit-btn-leave" onclick="doQuit()">🏠 メニューへ</button>
    </div>
  </div>
</div>

<!-- ===== リザルト ===== -->
<div class="screen" id="screen-result">
  <div class="result-content">
    <div class="result-emoji-big" id="result-emoji">🎉</div>
    <h2 class="result-title" id="result-title">すごい！</h2>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>

    <div class="result-score-box">
      <div class="result-score-row">
        <span class="result-lbl">せいかい</span>
        <span class="result-val"><span id="r-correct">0</span> / <span id="r-total">10</span></span>
      </div>
      <div class="result-score-row">
        <span class="result-lbl">とくてん</span>
        <span class="result-val result-pts" id="r-score">0てん</span>
      </div>
    </div>

    <!-- ミス一覧 -->
    <div id="miss-wrap" class="miss-wrap">
      <div class="miss-title">まちがえた けん</div>
      <div id="miss-list" class="miss-list"></div>
    </div>

    <div class="result-btns">
      <button class="btn-start" onclick="restartSame()">🔄 もういちど</button>
      <button class="btn-back" onclick="showScreen('screen-menu')">🏠 メニューへ</button>
    </div>
  </div>
</div>

<!-- ===== きろく ===== -->
<div class="screen" id="screen-records">
  <div class="setup-scroll">
    <h2 class="setup-title">🏆 きろく</h2>
    <div id="records-content" class="records-content"></div>
    <button class="btn-back" onclick="showScreen('screen-menu')">← もどる</button>
  </div>
</div>

<!-- ===== フラッシュカード ===== -->
<div class="screen" id="screen-flashcard">
  <div class="fc-topbar">
    <button class="btn-quit" onclick="showScreen('screen-menu')">✕ もどる</button>
    <div class="fc-progress">
      <span id="fc-current">1</span> / <span id="fc-total">47</span>
    </div>
    <select id="fc-region-filter" onchange="fcFilterChange()" class="fc-filter">
      <option value="all">ぜんぶ</option>
      <option value="北海道">北海道</option>
      <option value="東北">東北</option>
      <option value="関東">関東</option>
      <option value="中部">中部</option>
      <option value="近畿">近畿</option>
      <option value="中国">中国</option>
      <option value="四国">四国</option>
      <option value="九州">九州</option>
      <option value="沖縄">沖縄</option>
    </select>
  </div>

  <div class="fc-card-wrap">
    <div class="fc-card" id="fc-card" onclick="fcFlip()">
      <!-- 表 -->
      <div class="fc-front" id="fc-front">
        <div class="fc-name" id="fc-name">北海道</div>
        <div class="fc-kana" id="fc-kana">ほっかいどう</div>
        <div class="fc-shape-box">
          <svg class="fc-shape-svg" id="fc-shape-svg" viewBox="0 0 200 200">
            <polygon id="fc-polygon" fill="#0ea5e9" stroke="rgba(0,229,195,0.5)" stroke-width="2"/>
          </svg>
        </div>
        <div class="fc-tap-hint">タップでうらを見る</div>
      </div>
      <!-- 裏 -->
      <div class="fc-back" id="fc-back">
        <div class="fc-back-region" id="fc-region"></div>
        <div class="fc-back-capital" id="fc-capital-label">けんちょうしょざいち</div>
        <div class="fc-back-capital-val" id="fc-capital-val"></div>
        <div class="fc-back-famous" id="fc-famous-list"></div>
        <div class="fc-back-fact" id="fc-fact"></div>
      </div>
    </div>
  </div>

  <div class="fc-nav">
    <button class="fc-nav-btn" onclick="fcPrev()">← まえ</button>
    <button class="fc-nav-btn" onclick="fcNext()">つぎ →</button>
  </div>
</div>

<a id="back-to-hub" href="/lab" style="display:none">
  <span class="hub-icon">🏠</span>ぜんぶメニュー
</a>

<script src="../../common/speech.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
